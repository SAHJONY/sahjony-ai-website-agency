<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — FrontDesk Agents</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#04080f;--gold:#e8c476;--teal:#2dd4bf;--text:#e8eef7;--muted:#9fb3c9;--line:rgba(45,212,191,.16)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:radial-gradient(120% 80% at 50% -10%,#0a1626,var(--ink) 60%);color:var(--text);min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
  .fd{font-family:'Fraunces',serif}
  .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(180deg,#f6dba2,var(--gold));display:flex;align-items:center;justify-content:center;color:#1a1206;font-weight:800;margin:0 auto 18px}
  h1{font-family:'Fraunces',serif;font-size:64px;font-weight:700;line-height:1}
  p{color:var(--muted);margin:10px 0 24px;font-size:16px}
  .btn{border:none;cursor:pointer;font-weight:700;border-radius:11px;padding:13px 22px;font-size:15px;text-decoration:none;display:inline-block;margin:4px}
  .gold{background:linear-gradient(180deg,#f6dba2,var(--gold));color:#1a1206}
  .ghost{background:rgba(45,212,191,.08);color:#cdeee9;border:1px solid rgba(45,212,191,.4)}
</style>
</head>
<body>
<div>
  <div class="logo">FD</div>
  <h1 class="fd">404</h1>
  <p>That page moved or never existed.<br>Let's get you back on track.</p>
  <a href="/" class="btn gold">← Home</a>
  <a href="/pricing.html" class="btn ghost">See pricing</a>
  <a href="/builder.html" class="btn ghost">Build a free preview</a>
</div>
</body>
</html>
