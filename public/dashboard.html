    <button class="tab" data-tab="playbook" style="text-align:left;border:none;cursor:pointer;font-size:14.5px;font-weight:600;padding:11px 13px;border-radius:10px;background:transparent;color:#b6b2c2">📖 Playbook</button>

      <select data-lang-select data-no-i18n aria-label="Language" style="background:rgba(255,255,255,.06);color:#b6b2c2;border:1px solid rgba(255,255,255,.12);font-size:12.5px;font-weight:600;padding:8px;border-radius:9px;cursor:pointer"></select>

      <div style="display:flex;gap:8px">
        <button id="findBtn" style="display:none;background:rgba(47,212,127,.16);color:#2fd47f;border:none;cursor:pointer;font-size:14px;font-weight:700;padding:11px 16px;border-radius:10px">📍 Find leads</button>
        <button id="addBtn" style="background:#e8c476;color:#04080f;border:none;cursor:pointer;font-size:14px;font-weight:700;padding:11px 18px;border-radius:10px">＋ Add</button>
      </div>

    <div id="list" data-no-i18n style="display:flex;flex-direction:column;gap:10px"></div>

<script>
const KEY = "fda:panel:owner";
let state = { leads:[], clients:[], subs:[] };
let tab = "leads";

async function load(){
  try{
    const r = await fetch("/api/data?key="+encodeURIComponent(KEY), { headers: authHeaders() });
    const j = await r.json();
    if(j.value){ state = Object.assign({leads:[],clients:[],subs:[]}, j.value); }
    document.getElementById("cloudDot").textContent = "Cloud: connected ✓";
    document.getElementById("cloudDot").style.color = "#2fd47f";
  }catch(e){
    document.getElementById("cloudDot").textContent = "Cloud: offline (set env vars)";
  }
  if(!state.subs) state.subs = [];
  if(!state.leads.length && !state.clients.length){
    state.leads = [
      {id:1,name:"Maria's Bakery",type:"Bakery",city:"Katy, TX",value:"$1,299 build"},
      {id:2,name:"Sunset Nails",type:"Nail Salon",city:"Sugar Land",value:"$899 build"},
    ];
  }
  render();
}

function authHeaders(extra){
  const h = Object.assign({}, extra||{});
  const t = sessionStorage.getItem("fda_admin");
  if(t) h["x-admin-token"] = t;
  return h;
}

async function save(){
  try{
    await fetch("/api/data?key="+encodeURIComponent(KEY),{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:JSON.stringify(state)});
    document.getElementById("cloudDot").textContent = "Cloud: saved ✓";
    document.getElementById("cloudDot").style.color = "#2fd47f";
  }catch(e){ document.getElementById("cloudDot").textContent = "Cloud: save failed"; }
}

const TITLES = { leads:["Leads","New business in your pipeline"], clients:["Clients","Businesses you've built sites for"], inbox:["Inbox","Free-mockup requests from your site"], subs:["Subscriptions","Recurring care-plan revenue"], sites:["Sites","Published client websites"], customers:["Customers","Vehicles, financing, payments & portal access"], statereq:["State Rules","Auto-finance & refinance requirements by state — review & edit"], playbook:["Playbook","Your A→Z strategy (owner-only)"], scripts:["Scripts","Your sales scripts (owner-only — keep private)"], settings:["Settings","Manage AI engine keys (env secrets)"] };

function render(){
  const [t,s] = TITLES[tab] || TITLES.leads;
  document.getElementById("pTitle").textContent = t;
  document.getElementById("pSub").textContent = s;
  document.getElementById("addBtn").style.display = (tab==="settings"||tab==="statereq") ? "none" : "block";
  document.getElementById("addBtn").textContent = tab==="subs" ? "＋ Add subscription" : (tab==="customers" ? "＋ Add customer" : "＋ Add");
  document.getElementById("findBtn").style.display = tab==="leads" ? "block" : "none";
  if(tab==="settings"){ renderSettings(); return; }
  if(tab==="inbox"){ renderInbox(); return; }
  if(tab==="subs"){ renderSubs(); return; }
  if(tab==="sites"){ renderSites(); return; }
  if(tab==="customers"){ renderCustomers(); return; }
  if(tab==="statereq"){ renderStateReq(); return; }
  if(tab==="playbook"){ renderPlaybook(); return; }
  if(tab==="scripts"){ renderScripts(); return; }
  const items = state[tab]||[];
  const list = document.getElementById("list");
  if(!items.length){ list.innerHTML = `<div style="color:#8c8998;font-size:14px;padding:20px">No ${tab} yet. Click “Add”.</div>`; return; }
  list.innerHTML = items.map((it,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 20px">
      <div><div style="font-weight:700;font-size:15px">${it.name||""}</div><div style="font-size:12.5px;color:#8c8998">${(it.type||"")}${it.city?(" · "+it.city):""}${it.value?(" · "+it.value):""}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
        <button data-i="${i}" class="reach" style="background:rgba(123,162,255,.14);color:#7aa2ff;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px">✉️ Reach</button>
        ${tab==="leads"?`<button data-i="${i}" class="win" style="background:rgba(21,194,107,.14);color:#2fd47f;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px">Won →</button>`:""}
        <button data-i="${i}" class="del" style="background:rgba(255,90,77,.14);color:#ff7a6e;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px">Delete</button>
      </div>
    </div>`).join("");
  list.querySelectorAll(".del").forEach(b=>b.onclick=()=>{ const i=+b.dataset.i; state[tab].splice(i,1); save(); render(); });
  list.querySelectorAll(".reach").forEach(b=>b.onclick=()=>reach(+b.dataset.i));
  list.querySelectorAll(".win").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i; const lead=state.leads.splice(i,1)[0];
    state.clients.push({...lead, value:"Live · $89/mo"});
    // Auto-start a care-plan subscription for the new client.
    state.subs.push({ id:Date.now(), name:lead.name, plan:"Care plan", price:89, status:"active", since:new Date().toISOString().slice(0,10) });
    save(); render();
  });
}

/* ===================== SUBSCRIPTIONS ===================== */
function money(n){ return "$"+(Number(n)||0).toLocaleString(); }
function renderSubs(){
  const list = document.getElementById("list");
  const subs = state.subs||[];
  const active = subs.filter(s=>s.status==="active");
  const mrr = active.reduce((t,s)=>t+(Number(s.price)||0),0);
  const paused = subs.filter(s=>s.status==="paused").length;
  const canceled = subs.filter(s=>s.status==="canceled").length;

  const summary = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px">
      <div style="background:linear-gradient(160deg,#1f1626,#122236);border:1px solid rgba(232,196,118,.3);border-radius:12px;padding:16px"><div style="font-size:12px;color:#8c8998">Monthly recurring (MRR)</div><div style="font-family:'Fraunces',sans-serif;font-size:28px;font-weight:700;color:#2dd4bf">${money(mrr)}</div></div>
      <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px"><div style="font-size:12px;color:#8c8998">Yearly (ARR)</div><div style="font-family:'Fraunces',sans-serif;font-size:28px;font-weight:700">${money(mrr*12)}</div></div>
      <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px"><div style="font-size:12px;color:#8c8998">Active</div><div style="font-family:'Fraunces',sans-serif;font-size:28px;font-weight:700;color:#2fd47f">${active.length}</div></div>
      <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px"><div style="font-size:12px;color:#8c8998">Paused · Canceled</div><div style="font-family:'Fraunces',sans-serif;font-size:28px;font-weight:700">${paused} · ${canceled}</div></div>
    </div>`;

  if(!subs.length){ list.innerHTML = summary + `<div style="color:#8c8998;font-size:14px;padding:20px">No subscriptions yet. Mark a lead “Won” or click “Add subscription”.</div>`; return; }

  const statusColor = {active:["#2fd47f","rgba(21,194,107,.14)"], paused:["#e8b13a","rgba(232,177,58,.14)"], canceled:["#ff7a6e","rgba(255,90,77,.14)"]};
  const rows = subs.map((s,i)=>{
    const [c,bg]=statusColor[s.status]||statusColor.active;
    const toggle = s.status==="active"
      ? `<button data-i="${i}" class="sPause" style="background:rgba(232,177,58,.14);color:#e8b13a;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Pause</button>`
      : s.status==="paused"
      ? `<button data-i="${i}" class="sResume" style="background:rgba(21,194,107,.14);color:#2fd47f;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Resume</button>`
      : `<button data-i="${i}" class="sResume" style="background:rgba(21,194,107,.14);color:#2fd47f;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Reactivate</button>`;
    const cancelBtn = s.status!=="canceled" ? `<button data-i="${i}" class="sCancel" style="background:rgba(255,90,77,.1);color:#ff7a6e;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Cancel</button>` : "";
    return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:15px 18px">
      <div><div style="font-weight:700;font-size:15px">${s.name||""} <span style="display:inline-block;font-size:11px;font-weight:700;color:${c};background:${bg};padding:2px 9px;border-radius:999px;margin-left:6px;text-transform:capitalize">${s.status}</span></div>
      <div style="font-size:12.5px;color:#8c8998;margin-top:3px">${money(s.price)}/mo · ${s.plan||"Care plan"}${s.since?(" · since "+s.since):""}</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end"><button data-i="${i}" class="sLink" style="background:rgba(123,162,255,.14);color:#7aa2ff;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">💳 Link</button>${toggle}${cancelBtn}<button data-i="${i}" class="sDel" style="background:rgba(255,255,255,.06);color:#8c8998;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Delete</button></div>
    </div>`;
  }).join("");

  const toolbar = `<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button id="payLinkBtn" style="background:rgba(232,196,118,.16);color:#2dd4bf;border:none;cursor:pointer;font-size:13px;font-weight:700;padding:9px 15px;border-radius:9px">💳 Create payment link</button></div>`;
  list.innerHTML = summary + toolbar + rows;
  document.getElementById("payLinkBtn").onclick = ()=>{
    const name=prompt("Client / business name?"); if(!name) return;
    const build=parseFloat(prompt("One-time build price? (USD, 0 to skip)","1299"))||0;
    const monthly=parseFloat(prompt("Monthly care plan? (USD, 0 to skip)","89"))||0;
    const installments=Math.max(1,Math.round(parseFloat(prompt("Can't pay in full? Split the build into how many monthly payments?\n(1 = pay in full)","1"))||1));
    let down=0;
    if(installments>1 && build>0){ down=Math.max(0,parseFloat(prompt("Down payment due today? (USD — leave blank to use your minimum policy)","")||0)||0); }
    const slug=(prompt("Link to a published site? Enter its slug to auto-publish on payment & pull it on missed payment (leave blank to skip):","")||"").trim();
    const ref=(prompt("Sales rep referral code? (leave blank if none — commission is auto-recorded on payment):","")||"").trim();
    paymentLink(name, build, monthly, installments, down, slug, ref);
  };
  list.querySelectorAll(".sLink").forEach(b=>b.onclick=()=>{ const s=state.subs[+b.dataset.i]; paymentLink(s.name, 0, Number(s.price)||0, 1); });
  list.querySelectorAll(".sPause").forEach(b=>b.onclick=()=>{ state.subs[+b.dataset.i].status="paused"; save(); render(); });
  list.querySelectorAll(".sResume").forEach(b=>b.onclick=()=>{ state.subs[+b.dataset.i].status="active"; save(); render(); });
  list.querySelectorAll(".sCancel").forEach(b=>b.onclick=()=>{ if(confirm("Cancel this subscription?")){ state.subs[+b.dataset.i].status="canceled"; save(); render(); } });
  list.querySelectorAll(".sDel").forEach(b=>b.onclick=()=>{ if(confirm("Delete this subscription record?")){ state.subs.splice(+b.dataset.i,1); save(); render(); } });
}

async function paymentLink(name, build, monthly, installments, downPayment, slug, ref){
  try{
    const r = await fetch("/api/checkout",{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:JSON.stringify({name,build,monthly,installments:installments||1,downPayment:downPayment||0,slug:slug||"",ref:ref||""})});
    const j = await r.json();
    if(!r.ok){ alert(j.error||"Could not create payment options."); return; }
    // The server returns a ready-to-send message. Zelle + Cash App lead by default
    // (no fees); Stripe/Square are secondary until PAYMENTS_PRIMARY=stripe.
    const msg = j.message || j.url || "";
    try{ await navigator.clipboard.writeText(msg); }catch(_){}
    // Only auto-open the card checkout when cards are the primary method.
    if(j.url && j.primary!=="manual") window.open(j.url,"_blank");
    alert("✓ Payment options copied — paste into a text or email to "+name+":\n\n"+msg);
  }catch(e){ alert("Network error creating payment options."); }
}

/* ===================== LEAD FINDER + OUTREACH ===================== */
function findLeads(){
  const kw = prompt("Business type to find? (e.g. barber, bakery, auto repair)\nLeave blank for all.","")||"";
  const list = document.getElementById("list");
  const run = async (payload)=>{
    list.innerHTML = `<div style="color:#8c8998;padding:20px">🔎 Searching businesses…</div>`;
    try{
      const r = await fetch("/api/leads-find",{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:JSON.stringify({keyword:kw,...payload})});
      const j = await r.json();
      if(!r.ok){ list.innerHTML = `<div style="color:#ff7a6e;padding:20px">${j.error||"Search failed."}</div>`; return; }
      renderFound(j.leads||[]);
    }catch(e){ list.innerHTML = `<div style="color:#ff7a6e;padding:20px">Network error.</div>`; }
  };
  // Fallback when location is denied/unsupported: let them type a city/area.
  const askLocation = ()=>{
    const loc = (prompt("Couldn't use your location. Enter a city or area to search:\n(e.g. \"Houston, TX\" or a ZIP code)","")||"").trim();
    if(!loc){ list.innerHTML = `<div style="color:#8c8998;padding:20px">No location given. Click “📍 Find leads” to try again.</div>`; return; }
    run({locationText:loc});
  };
  if(!navigator.geolocation){ askLocation(); return; }
  list.innerHTML = `<div style="color:#8c8998;padding:20px">📍 Getting your location…</div>`;
  navigator.geolocation.getCurrentPosition(

const INBOX_KEY = "fda:contact:inbox";
let inboxCache = [];
async function renderInbox(){
  document.getElementById("addBtn").style.display = "none";
  const list = document.getElementById("list");
  list.innerHTML = `<div style="color:#8c8998;font-size:14px;padding:20px">Loading…</div>`;
  try{
    const r = await fetch("/api/data?key="+encodeURIComponent(INBOX_KEY), { headers: authHeaders() });
    const j = await r.json();
    if(!r.ok){ list.innerHTML = `<div style="color:#ff7a6e;padding:20px">${j.error||"Could not load inbox."}</div>`; return; }
    inboxCache = Array.isArray(j.value) ? j.value.slice().reverse() : []; // newest first
  }catch(e){ list.innerHTML = `<div style="color:#ff7a6e;padding:20px">Network error.</div>`; return; }

  if(!inboxCache.length){ list.innerHTML = `<div style="color:#8c8998;font-size:14px;padding:20px">No requests yet. They arrive here when someone submits the <a href="/contact.html" style="color:#2dd4bf">contact form</a>.</div>`; return; }
  list.innerHTML = inboxCache.map((m,i)=>`
    <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div style="min-width:0"><div style="font-weight:700;font-size:15px">${m.name||"(no name)"} <span style="color:#8c8998;font-weight:500;font-size:13px">· ${m.type||""}</span></div>
        <div style="font-size:13px;color:#b6b2c2;margin-top:3px">${m.contact||""}${m.city?(" · "+m.city):""}</div>
        ${m.url?`<div style="font-size:12.5px;color:#8c8998;margin-top:2px">site: ${m.url}</div>`:""}
        ${m.notes?`<div style="font-size:13px;color:#cbc8d4;margin-top:6px">“${m.notes}”</div>`:""}
        <div style="font-size:11.5px;color:#5c5c66;margin-top:6px">${(m.at||"").slice(0,16).replace("T"," ")}</div></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">
          <button data-i="${i}" class="ibLead" style="background:rgba(232,196,118,.16);color:#2dd4bf;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">+ Lead</button>
          <button data-i="${i}" class="ibReach" style="background:rgba(123,162,255,.14);color:#7aa2ff;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">✉️ Reach</button>
          <button data-i="${i}" class="ibDel" style="background:rgba(255,90,77,.14);color:#ff7a6e;border:none;cursor:pointer;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px">Delete</button>
        </div>
      </div>
    </div>`).join("");
  list.querySelectorAll(".ibLead").forEach(b=>b.onclick=()=>{ const m=inboxCache[+b.dataset.i]; state.leads.push({id:Date.now(),name:m.name,type:m.type||"",city:m.city||"",phone:m.contact||"",value:"Mockup request 🔥"}); save(); b.textContent="Added ✓"; b.disabled=true; });
  list.querySelectorAll(".ibReach").forEach(b=>b.onclick=()=>{ const m=inboxCache[+b.dataset.i]; sendOutreach(m.name, m.contact||""); });
  list.querySelectorAll(".ibDel").forEach(b=>b.onclick=()=>deleteInbox(+b.dataset.i));
}
async function deleteInbox(i){
  if(!confirm("Delete this request?")) return;
  const target = inboxCache[i];
  // inboxCache is reversed; rebuild the original-order array without this entry (match by id).
  const remaining = inboxCache.filter(x=>x!==target).slice().reverse();
  try{
    const r = await fetch("/api/data?key="+encodeURIComponent(INBOX_KEY),{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:JSON.stringify(remaining)});
    if(!r.ok){ const j=await r.json(); alert(j.error||"Delete failed"); return; }
    renderInbox();
  }catch(e){ alert("Network error."); }
}

function balanceOf(c){
  const ct=c.contract||{}, pays=Array.isArray(c.payments)?c.payments:[];
  const paid=pays.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const monthly=Number(ct.monthlyPayment)||0, term=Number(ct.termMonths)||0;
  const total = monthly&&term ? monthly*term : (Number(ct.amountFinanced)||0);
  return ct.payoffAmount!=null ? Number(ct.payoffAmount) : Math.max(0,total-paid);
}

      field("APR %","cd_c_apr",ct.apr,"number")+field("Term (months)","cd_c_term",ct.termMonths,"number")+field("Monthly payment","cd_c_monthly",ct.monthlyPayment,"number")+
      field("First payment date","cd_c_first",ct.firstDueDate,"date")+field("Payoff amount (optional)","cd_c_payoff",ct.payoffAmount,"number")
    ) + `<label style="display:block;font-size:12px;color:#8c8998;margin:10px 0 5px">State (for disclosures)</label><select id="cd_c_state" style="width:100%;background:#0f0f16;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:10px 12px;color:#e9e7ef;font-size:14px">${stateOpts}</select>
       <div style="margin-top:10px;font-size:13px;color:#8c8998">Estimated balance: <b style="color:#2dd4bf">${moneyD(balanceOf(c))}</b></div>`) +

    card(`💳 Payments (${pays.length})`, `<button id="cPay" style="background:rgba(21,194,107,.14);color:#2fd47f;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:9px;margin-bottom:10px">＋ Record payment</button>` +
      (pays.length? pays.map((p,idx)=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)"><div><b>${moneyD(p.amount)}</b> <span style="color:#8c8998;font-size:12px">${(p.method||"Payment")}</span></div><div style="text-align:right;font-size:12px;color:#8c8998">${p.date?new Date(p.date).toLocaleDateString():""} <button data-pi="${pays.length-1-idx}" class="cPayDel" style="background:none;border:none;color:#ff7a6e;cursor:pointer;font-weight:700">✕</button></div></div>`).join("") : `<div style="color:#8c8998;font-size:13px">No payments recorded.</div>`)) +

    card("🧑‍💼 Financial profile (from customer)", grid(
      field("Annual income","cd_f_income",f.income,"number")+field("Employer","cd_f_employer",f.employer)+field("Years employed","cd_f_years",f.employmentYears,"number")
    ) + (f.notes?`<div style="margin-top:8px;font-size:13px;color:#b6b2c2">Notes: ${String(f.notes).replace(/</g,"&lt;")}</div>`:"")) +

    card(`📨 Requests (${reqs.length})`, reqs.length? reqs.map((r,idx)=>`<div style="display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07)"><div><b style="text-transform:capitalize">${r.type||"message"}</b>${r.amount?(" · "+moneyD(r.amount)):""}<div style="font-size:12px;color:#8c8998">${(r.message||"").replace(/</g,"&lt;")}</div></div><div style="text-align:right"><span style="font-size:11px;color:${r.status==="closed"?"#2fd47f":"#e8b13a"}">${r.status||"open"}</span><br>${r.status!=="closed"?`<button data-ri="${idx}" class="cReqClose" style="background:none;border:none;color:#7aa2ff;cursor:pointer;font-size:12px;font-weight:700">Mark done</button>`:""}</div></div>`).join("") : `<div style="color:#8c8998;font-size:13px">No requests from this customer.</div>`);

  // wiring
  document.getElementById("cBack").onclick=()=>{ curCust=null; renderCustomers(); };
  document.getElementById("cSave").onclick=saveCurCust;
  document.getElementById("cDel").onclick=deleteCurCust;
  document.getElementById("cCode").onclick=()=>{ curCust.accessCode=genCode(); renderCustomerDetail(); };
  document.getElementById("cCopy").onclick=()=>{
    const code=document.getElementById("cd_name")&&curCust.accessCode;
    const msg = `Manage your vehicle, payments & financing in our app:\n${portalURL()}\n\nEmail: ${curCust.email||"(your email)"}\nAccess code: ${curCust.accessCode||"(issue a code first)"}\n\nTip: open the link on your phone and tap “Add to Home Screen” to install it as an app.`;
    navigator.clipboard.writeText(msg).then(()=>alert("Portal invite copied — paste it to your customer (text/email)."),()=>prompt("Copy this:",msg));
  };
  document.getElementById("cPay").onclick=()=>{
    const amt=parseFloat(prompt("Payment amount (USD)?",String(curCust.contract&&curCust.contract.monthlyPayment||"")))||0;
    if(!amt) return; const method=prompt("Method? (Cash, Card, Zelle, Cash App, Bank)","Cash")||"Payment";
    curCust.payments=Array.isArray(curCust.payments)?curCust.payments:[];
    curCust.payments.push({date:new Date().toISOString().slice(0,10),amount:amt,method:method});
    renderCustomerDetail();
  };
  list.querySelectorAll(".cPayDel").forEach(b=>b.onclick=()=>{ curCust.payments.splice(+b.dataset.pi,1); renderCustomerDetail(); });
  list.querySelectorAll(".cReqClose").forEach(b=>b.onclick=()=>{ curCust.requests[+b.dataset.ri].status="closed"; renderCustomerDetail(); });
}

function collectCust(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
  const num=id=>{const v=g(id);return v===""||v==null?null:Number(v);};
  curCust.name=g("cd_name"); curCust.email=g("cd_email"); curCust.phone=g("cd_phone"); curCust.status=(g("cd_status")||"active").trim().toLowerCase();
  curCust.dealerName=dealerName();
  curCust.vehicle={year:num("cd_v_year"),make:g("cd_v_make"),model:g("cd_v_model"),trim:g("cd_v_trim"),vin:g("cd_v_vin"),color:g("cd_v_color"),mileage:num("cd_v_mileage"),stock:g("cd_v_stock")};
  curCust.contract={salePrice:num("cd_c_price"),downPayment:num("cd_c_down"),amountFinanced:num("cd_c_fin"),apr:num("cd_c_apr"),termMonths:num("cd_c_term"),monthlyPayment:num("cd_c_monthly"),firstDueDate:g("cd_c_first"),payoffAmount:num("cd_c_payoff"),state:g("cd_c_state"),status:curCust.status};
  curCust.state=g("cd_c_state");
  const f=curCust.financial||{};
  curCust.financial={income:num("cd_f_income"),employer:g("cd_f_employer"),employmentYears:num("cd_f_years"),notes:f.notes};
}

async function saveCurCust(){
  collectCust();
  if(!curCust.email){ alert("An email is required (it's the customer's portal login)."); return; }
  if(!curCust.id) curCust.id=newId();
  const btn=document.getElementById("cSave"); btn.disabled=true; btn.textContent="Saving…";
  try{
    await kvSet("fda:cust:"+curCust.id, curCust);
    await kvSet("fda:custmap:"+normEmail(curCust.email), {id:curCust.id});   // email -> id (portal login lookup); object form so /api/data doesn't mangle it
    await loadCustIndex();
    const summary={id:curCust.id,name:curCust.name,email:curCust.email,status:curCust.status,vehicle:{year:curCust.vehicle.year,make:curCust.vehicle.make,model:curCust.vehicle.model}};
    const ix=custIndex.findIndex(x=>x.id===curCust.id);
    if(ix>=0) custIndex[ix]=summary; else custIndex.push(summary);
    await kvSet(CUST_INDEX_KEY, custIndex);
    document.getElementById("cloudDot").textContent="Cloud: saved ✓"; document.getElementById("cloudDot").style.color="#2fd47f";
    alert("Saved. Customer can sign in at "+portalURL()+" with their email + access code.");
  }catch(e){ alert("Save failed: "+e.message); }
  btn.disabled=false; btn.textContent="Save";
}

async function deleteCurCust(){
  if(!curCust.id){ curCust=null; return renderCustomers(); }
  if(!confirm("Delete this customer and their portal access?")) return;
  try{
    await fetch("/api/data?key="+encodeURIComponent("fda:cust:"+curCust.id),{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:"{}"});
    if(curCust.email) await fetch("/api/data?key="+encodeURIComponent("fda:custmap:"+normEmail(curCust.email)),{method:"POST",headers:authHeaders({"content-type":"application/json"}),body:"{}"});
    await loadCustIndex(); custIndex=custIndex.filter(x=>x.id!==curCust.id); await kvSet(CUST_INDEX_KEY,custIndex);
  }catch(e){}
  curCust=null; renderCustomers();
}

function newCustomer(){
  curCust={ id:newId(), name:"", email:"", status:"active", accessCode:genCode(), dealerName:dealerName(), vehicle:{}, contract:{state:"CA"}, payments:[], financial:{}, requests:[] };
  renderCustomerDetail();
}

/* ===================== STATE REQUIREMENTS — review & edit ===================== */
const STATEREQ_KEY = "fda:statereq:overrides";
let stateOverrides = null;
async function renderStateReq(){
  const list=document.getElementById("list");
  if(!window.StateReq){ list.innerHTML=`<div style="color:#8c8998;padding:20px">Requirements engine not loaded.</div>`; return; }
  if(stateOverrides===null){ try{ stateOverrides = (await kvGet(STATEREQ_KEY))||{}; }catch(e){ stateOverrides={}; } }
  const opts=window.StateReq.states().map(s=>`<option value="${s.code}">${s.name}</option>`).join("");
  list.innerHTML=`
    <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px;margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select id="srState" style="flex:1;min-width:180px;background:#0f0f16;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:10px 12px;color:#e9e7ef;font-size:14px">${opts}</select>
        <button id="srEdit" style="background:rgba(123,162,255,.14);color:#7aa2ff;border:none;cursor:pointer;font-size:13px;font-weight:700;padding:9px 16px;border-radius:9px">✎ Edit / verify</button>
      </div>
      <p style="font-size:12.5px;color:#8c8998;margin:10px 0 0">⚠️ This is a commonly-cited baseline, <b>not legal advice</b>. Have your attorney verify each state before relying on it. Edits are saved to your account and used in the customer portal.</p>
    </div>
    <div id="srView"></div>`;
  const sel=document.getElementById("srState");
  const show=()=>{ document.getElementById("srView").innerHTML=window.StateReq.render(sel.value,"autoSales",{overrides:stateOverrides}); window.StateReq.injectCSS(); };
  sel.onchange=show; show();
  document.getElementById("srEdit").onclick=()=>editState(sel.value);
}
function editState(code){
  const base=window.StateReq.get(code,"autoSales",stateOverrides).state;
  const fields=[["dealerLicense","Dealer licensing"],["salesTax","Sales / titling tax"],["docFee","Documentary / processing fee"],["coolingOff","Right to cancel"],["retailInstallment","Retail-installment / finance law"],["usury","Interest-rate (usury) limits"],["gap","GAP / debt-cancellation"],["refinance","Refinancing"]];
  const list=document.getElementById("list");
  list.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><button id="srBack" style="background:transparent;border:1px solid rgba(255,255,255,.14);color:#b6b2c2;cursor:pointer;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:9px">← Back</button><button id="srSave" style="background:#e8c476;color:#04080f;border:none;cursor:pointer;font-size:13px;font-weight:700;padding:9px 18px;border-radius:9px">Save ${code}</button></div>
    <div style="background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px 18px"><div style="font-weight:700;margin-bottom:6px">${base.name} — edit requirements</div>`+
    `<label style="display:block;font-size:12px;color:#8c8998;margin:10px 0 5px">State regulator</label><input id="sr_regulator" value="${(base.regulator||"").replace(/"/g,"&quot;")}" style="width:100%;background:#0f0f16;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:10px 12px;color:#e9e7ef;font-size:14px">`+
    fields.map(f=>`<label style="display:block;font-size:12px;color:#8c8998;margin:10px 0 5px">${f[1]}</label><textarea id="sr_${f[0]}" rows="2" style="width:100%;background:#0f0f16;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:10px 12px;color:#e9e7ef;font-size:14px">${(base[f[0]]||"").replace(/</g,"&lt;")}</textarea>`).join("")+
    `<label style="display:flex;gap:8px;align-items:center;margin-top:12px;font-size:13px;color:#b6b2c2"><input type="checkbox" id="sr_verified" ${base.verified?"checked":""} style="width:auto"> I (or my counsel) have verified this state is accurate</label></div>`;
  document.getElementById("srBack").onclick=renderStateReq;
  document.getElementById("srSave").onclick=async()=>{
    const o={regulator:document.getElementById("sr_regulator").value};
    fields.forEach(f=>{ o[f[0]]=document.getElementById("sr_"+f[0]).value; });
    o.verified=document.getElementById("sr_verified").checked;
    stateOverrides=stateOverrides||{}; stateOverrides[code]=Object.assign({},stateOverrides[code],o);
    try{ await kvSet(STATEREQ_KEY,stateOverrides); alert(code+" saved."); renderStateReq(); }catch(e){ alert("Save failed: "+e.message); }
  };
}

/* ===================== SETTINGS — env secrets manager ===================== */
function adminToken(){ return sessionStorage.getItem("fda_admin") || ""; }
function setAdminToken(t){ if(t) sessionStorage.setItem("fda_admin", t); else sessionStorage.removeItem("fda_admin"); }

async function renderSettings(){
  const list = document.getElementById("list");
  if(!adminToken()){
    list.innerHTML = `
      <div style="max-width:480px;background:#122236;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px">
        <div style="font-family:'Fraunces',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px">🔒 Unlock secrets manager</div>
        <div style="font-size:13.5px;color:#8c8998;line-height:1.55;margin-bottom:16px">Enter your admin password (the <b>ADMIN_PASSWORD</b> env var). It's kept only in this browser tab and sent over HTTPS to manage your AI keys.</div>
        <input id="adminPw" type="password" placeholder="Admin password" style="width:100%;background:#04080f;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:12px 14px;color:#e9e7ef;font-size:15px;margin-bottom:12px">
        <button id="unlockBtn" style="width:100%;background:#e8c476;color:#04080f;border:none;cursor:pointer;font-weight:700;font-size:15px;padding:12px;border-radius:10px">Unlock</button>
        <div id="setMsg" style="display:none;font-size:13px;margin-top:12px"></div>
      </div>`;
    document.getElementById("unlockBtn").onclick = async ()=>{
      const pw = document.getElementById("adminPw").value.trim();
      if(!pw) return;
      setAdminToken(pw);
      const ok = await loadSecrets();
      if(!ok) setAdminToken(""); // clear on failure so the unlock form returns
    };
    document.getElementById("adminPw").addEventListener("keydown", e=>{ if(e.key==="Enter") document.getElementById("unlockBtn").click(); });
    return;
  }
  await loadSecrets();
}

function setMsg(text, ok){
  const m = document.getElementById("setMsg");
  if(!m) return;
  m.style.display="block"; m.textContent=text;
  m.style.color = ok ? "#2fd47f" : "#ff7a6e";
}

async function loadSecrets(){
  const list = document.getElementById("list");
  let data;
  try{
    const r = await fetch("/api/secrets", { headers: { "x-admin-token": adminToken() } });
    data = await r.json();
    if(r.status===403 && data.locked){ list.innerHTML = `<div style="color:#ff7a6e;font-size:14px;padding:20px;max-width:560px;line-height:1.6">⚠️ ${data.reason}<br><span style="color:#8c8998">Add <b>ADMIN_PASSWORD</b> in Vercel → Settings → Environment Variables, redeploy, then unlock here.</span></div>`; return false; }
    if(r.status===401){ setMsg("Wrong admin password.", false); return false; }
    if(!r.ok){ list.innerHTML = `<div style="color:#ff7a6e;font-size:14px;padding:20px">${data.error||"Error loading secrets"}</div>`; return false; }
  }catch(e){ list.innerHTML = `<div style="color:#ff7a6e;font-size:14px;padding:20px">Network error.</div>`; return false; }

  const rows = (data.items||[]).map(it=>{
    const dot = it.source==="env" ? "#7aa2ff" : it.source==="db" ? "#2fd47f" : "#5c5c66";
    const tag = it.source==="env" ? "from environment" : it.source==="db" ? "stored • "+it.masked : "not set";
    const actions = it.source==="env"
      ? `<span style="font-size:12px;color:#7aa2ff">env-locked</span>`
      : `<button data-name="${it.name}" class="setKey" style="background:rgba(232,196,118,.16);color:#2dd4bf;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px">${it.source==="db"?"Update":"Add"}</button>`
        + (it.source==="db" ? ` <button data-name="${it.name}" class="delKey" style="background:rgba(255,90,77,.14);color:#ff7a6e;border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:8px">Delete</button>` : "");
    return `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;background:#122236;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:15px 18px">
        <div><div style="font-weight:700;font-size:14.5px">${it.label} <span style="color:#8c8998;font-weight:500">· ${it.name}</span></div>
        <div style="font-size:12.5px;color:#8c8998;margin-top:3px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dot};margin-right:6px"></span>${tag}</div></div>
        <div style="display:flex;gap:8px;white-space:nowrap">${actions}</div>
      </div>`;
  }).join("");

  list.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:13px;color:#8c8998">🔵 environment · 🟢 stored in cloud · ⚫ not set</div>
      <button id="lockBtn" style="background:transparent;color:#8c8998;border:1px solid rgba(255,255,255,.14);cursor:pointer;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:8px">Lock</button>
    </div>
    ${rows}
    <div id="setMsg" style="display:none;font-size:13px;margin-top:4px"></div>
    <div style="font-size:12px;color:#5c5c66;margin-top:8px;line-height:1.55">Keys set in the Vercel environment always win and can't be edited here. Stored keys are saved to your Upstash database and used by <b>/api/generate</b> as fallbacks. Values are never shown in full.</div>`;

  document.getElementById("lockBtn").onclick = ()=>{ setAdminToken(""); renderSettings(); };
  list.querySelectorAll(".setKey").forEach(b=>b.onclick=()=>saveKey(b.dataset.name));
  list.querySelectorAll(".delKey").forEach(b=>b.onclick=()=>deleteKey(b.dataset.name));
  return true;
}

async function saveKey(name){
  const value = prompt("Paste the value for "+name+":\n(stored encrypted-at-rest in your cloud DB; never shown again)");
  if(!value) return;
  try{
    const r = await fetch("/api/secrets",{method:"POST",headers:{"content-type":"application/json","x-admin-token":adminToken()},body:JSON.stringify({name, value})});
    const j = await r.json();
    if(!r.ok){ alert(j.error||"Save failed"); return; }
    await loadSecrets();
  }catch(e){ alert("Network error"); }
}

async function deleteKey(name){
  if(!confirm("Delete the stored "+name+"? The engine will stop using it.")) return;
  try{
    const r = await fetch("/api/secrets",{method:"POST",headers:{"content-type":"application/json","x-admin-token":adminToken()},body:JSON.stringify({name, delete:true})});
    const j = await r.json();
    if(!r.ok){ alert(j.error||"Delete failed"); return; }
    await loadSecrets();
  }catch(e){ alert("Network error"); }
}

/* ===================== LOGIN GATE ===================== */
function enterApp(){
  document.getElementById("loginGate").style.display = "none";
  document.querySelector(".dgrid").style.display = "grid";
  load();
}
async function doLogin(){
  const pw = document.getElementById("loginPw").value;
  const msg = document.getElementById("loginMsg");
  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Checking…";
  try{
    const r = await fetch("/api/login",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({password:pw})});
    const j = await r.json();
    if(r.ok && j.ok){
      sessionStorage.setItem("fda_auth","1");
      if(pw && !j.noPassword){
        sessionStorage.setItem("fda_admin", pw); // also unlocks Settings
        document.cookie = "fda_auth="+encodeURIComponent(pw)+";path=/;max-age=86400;samesite=strict"; // unlocks gated pages
      }
      enterApp();
      return;
    }
    msg.style.display="block"; msg.textContent = j.error || "Wrong password.";
  }catch(e){
    msg.style.display="block"; msg.textContent = "Network error — try again.";
  }finally{
    btn.disabled = false; btn.textContent = "Log in";
  }
}
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("loginPw").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
document.getElementById("logoutBtn").onclick = ()=>{ sessionStorage.removeItem("fda_auth"); sessionStorage.removeItem("fda_admin"); document.cookie="fda_auth=;path=/;max-age=0"; location.reload(); };

// Already logged in this session? Skip the gate.
if(sessionStorage.getItem("fda_auth")==="1"){ enterApp(); }
else { document.getElementById("loginPw").focus(); }
</script>
